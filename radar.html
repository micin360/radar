<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RADAR TRACKER</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    :root {
      --green:    #00ff41;
      --green2:   #00cc33;
      --green-dim:#004d15;
      --green-bg: #0a1f0a;
      --amber:    #ffaa00;
      --red:      #ff4040;
      --bg:       #010801;
    }

    html, body {
      height:100%; overflow:hidden;
      background:var(--bg);
      color:var(--green);
      font-family:'Share Tech Mono', monospace;
    }

    /* ─── SETUP SCREEN ─────────────────────────────────────────── */
    #setup {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:18px;
      height:100%; padding:30px 24px;
    }

    .logo-wrap { text-align:center; }
    .logo {
      font-family:'Orbitron',sans-serif;
      font-size:clamp(1.8rem,8vw,2.8rem);
      font-weight:900; letter-spacing:.35em;
      text-shadow:0 0 30px var(--green), 0 0 60px rgba(0,255,65,.3);
    }
    .logo-sub {
      font-size:.65rem; letter-spacing:.25em;
      color:var(--green-dim); margin-top:4px;
    }

    .divider {
      width:100%; max-width:360px; height:1px;
      background:linear-gradient(90deg,transparent,var(--green-dim),transparent);
    }

    .field-group { width:100%; max-width:360px; }
    .field-label {
      font-size:.62rem; letter-spacing:.12em;
      color:var(--green2); margin-bottom:5px; display:block;
    }
    input[type="number"], input[type="text"] {
      width:100%; background:rgba(0,255,65,.04);
      border:1px solid var(--green-dim);
      border-bottom:2px solid var(--green2);
      color:var(--green); font-family:'Share Tech Mono',monospace;
      font-size:1rem; padding:10px 12px; outline:none;
      letter-spacing:.08em; appearance:none; -moz-appearance:textfield;
    }
    input:focus { border-color:var(--green); box-shadow:0 0 12px rgba(0,255,65,.2); }

    .row { display:flex; gap:10px; }
    .row .field-group { flex:1; }

    .start-btn {
      width:100%; max-width:360px;
      background:transparent; border:2px solid var(--green);
      color:var(--green); font-family:'Orbitron',sans-serif;
      font-size:.85rem; font-weight:700; letter-spacing:.2em;
      padding:14px; cursor:pointer; text-transform:uppercase;
      transition:all .15s;
    }
    .start-btn:active {
      background:rgba(0,255,65,.12);
      box-shadow:0 0 25px rgba(0,255,65,.5);
    }

    .hint {
      font-size:.65rem; color:var(--green-dim);
      text-align:center; max-width:320px; line-height:1.6;
    }

    #err { color:#ff4141; font-size:.72rem; text-align:center; min-height:18px; }

    /* ─── RADAR SCREEN ─────────────────────────────────────────── */
    #radar-screen {
      display:none; flex-direction:column;
      align-items:center; height:100%;
      padding:8px 10px 6px;
    }

    #top-bar {
      display:flex; justify-content:space-between; align-items:center;
      width:100%; max-width:420px;
      font-size:.68rem; letter-spacing:.08em;
      color:var(--green-dim); padding:2px 6px; margin-bottom:4px;
    }
    #top-bar .val { color:var(--green); }

    #canvas-wrap {
      position:relative; flex:1;
      display:flex; align-items:center; justify-content:center;
      width:100%; max-width:420px;
    }

    canvas { display:block; }

    #info {
      width:100%; max-width:420px;
      text-align:center; padding:6px 0 4px;
    }
    #dist-val {
      font-family:'Orbitron',sans-serif;
      font-size:clamp(1.4rem,6vw,2rem); font-weight:700;
      text-shadow:0 0 15px currentColor;
      letter-spacing:.05em;
    }
    #dir-val {
      font-size:.72rem; color:var(--green2);
      letter-spacing:.1em; margin-top:3px;
    }

    #back-btn {
      background:transparent; border:1px solid var(--green-dim);
      color:var(--green-dim); font-family:'Share Tech Mono',monospace;
      font-size:.65rem; letter-spacing:.12em;
      padding:6px 18px; cursor:pointer; margin-top:4px;
      transition:all .15s;
    }
    #back-btn:active { color:var(--green); border-color:var(--green); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .blink { animation:pulse .8s infinite; }
  </style>
</head>
<body>

<!-- ══════════════ SETUP ══════════════ -->
<div id="setup">
  <div class="logo-wrap">
    <div class="logo">RADAR</div>
    <div class="logo-sub">GPS DIRECTION TRACKER v1.0</div>
  </div>

  <div class="divider"></div>

  <div class="field-group">
    <label class="field-label">▸ CÍLOVÁ ŠÍŘKA — LATITUDE</label>
    <input type="number" id="tlat" placeholder="49.8175" step="any">
  </div>
  <div class="field-group">
    <label class="field-label">▸ CÍLOVÁ DÉLKA — LONGITUDE</label>
    <input type="number" id="tlon" placeholder="18.2871" step="any">
  </div>

  <div class="row field-group" style="max-width:360px;width:100%">
    <div class="field-group">
      <label class="field-label">▸ BLÍZKO &lt; (m)</label>
      <input type="number" id="tc" value="100" min="1">
    </div>
    <div class="field-group">
      <label class="field-label">▸ STŘEDNĚ &lt; (m)</label>
      <input type="number" id="tm" value="500" min="1">
    </div>
  </div>

  <button class="start-btn" onclick="startTracker()">◉ SPUSTIT SLEDOVÁNÍ</button>
  <p id="err"></p>
  <p class="hint">Aplikace potřebuje přístup k poloze a gyroskopickému senzoru. Povolte, až vás prohlížeč požádá.</p>
</div>

<!-- ══════════════ RADAR ══════════════ -->
<div id="radar-screen">
  <div id="top-bar">
    <span>GPS:<span class="val" id="gps-st"> ČEKÁM</span></span>
    <span>KOMPAS:<span class="val" id="cmp-st"> ---</span></span>
    <span>HDG:<span class="val" id="hdg-val"> ---</span>°</span>
  </div>

  <div id="canvas-wrap">
    <canvas id="cvs"></canvas>
  </div>

  <div id="info">
    <div id="dist-val">---</div>
    <div id="dir-val">Čekám na polohu…</div>
  </div>
  <button id="back-btn" onclick="goBack()">← ZPĚT NA NASTAVENÍ</button>
</div>

<script>
/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let TLat, TLon, tClose, tMid;
let curLat, curLon;
let heading = 0;       // degrees from North, phone compass
let smoothHdg = null;
let gpsOk = false, cmpOk = false;

let raf, watchId;
let scanAngle = 0;
let pulsePhase = 0;

const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');

/* ═══════════════════════════════════════════════════
   CANVAS SIZE
═══════════════════════════════════════════════════ */
function sizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const sz = Math.min(wrap.clientWidth, wrap.clientHeight, 400);
  cvs.width = sz; cvs.height = sz;
}

/* ═══════════════════════════════════════════════════
   START
═══════════════════════════════════════════════════ */
function startTracker() {
  const lat = parseFloat(document.getElementById('tlat').value);
  const lon = parseFloat(document.getElementById('tlon').value);
  tClose = parseFloat(document.getElementById('tc').value) || 100;
  tMid   = parseFloat(document.getElementById('tm').value) || 500;

  const err = document.getElementById('err');
  if (isNaN(lat) || isNaN(lon)) { err.textContent = '⚠ Zadej platné souřadnice!'; return; }
  if (tClose >= tMid) { err.textContent = '⚠ BLÍZKO musí být menší než STŘEDNĚ!'; return; }
  err.textContent = '';

  TLat = lat; TLon = lon;

  document.getElementById('setup').style.display = 'none';
  document.getElementById('radar-screen').style.display = 'flex';
  sizeCanvas();
  drawEmpty();

  initGPS();
  initCompass();
  raf = requestAnimationFrame(renderLoop);
}

/* ═══════════════════════════════════════════════════
   GPS
═══════════════════════════════════════════════════ */
function initGPS() {
  if (!navigator.geolocation) { setGpsSt('CHYBA'); return; }
  setGpsSt('HLEDÁM…');
  watchId = navigator.geolocation.watchPosition(
    p => { curLat = p.coords.latitude; curLon = p.coords.longitude; gpsOk = true; setGpsSt('OK'); },
    () => setGpsSt('CHYBA'),
    { enableHighAccuracy:true, maximumAge:1500, timeout:15000 }
  );
}

/* ═══════════════════════════════════════════════════
   COMPASS / ORIENTATION
═══════════════════════════════════════════════════ */
function initCompass() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(s => {
        if (s === 'granted') bindOrientation();
        else setCmpSt('ODMÍTNUTO');
      }).catch(() => setCmpSt('CHYBA'));
  } else {
    bindOrientation();
  }
}

function bindOrientation() {
  window.addEventListener('deviceorientationabsolute', onOrient, true);
  window.addEventListener('deviceorientation', onOrient, true);
}

function onOrient(e) {
  let h = null;
  if (e.webkitCompassHeading != null) {
    h = e.webkitCompassHeading; // iOS: 0=N, CW
  } else if (e.alpha != null) {
    h = (360 - e.alpha + 360) % 360;
  }
  if (h === null) return;

  if (smoothHdg === null) { smoothHdg = h; }
  else {
    let d = h - smoothHdg;
    if (d >  180) d -= 360;
    if (d < -180) d += 360;
    smoothHdg = ((smoothHdg + d * 0.25) + 360) % 360;
  }
  heading = smoothHdg;
  cmpOk = true;
  setCmpSt('OK');
  document.getElementById('hdg-val').textContent = Math.round(heading);
}

/* ═══════════════════════════════════════════════════
   MATH
═══════════════════════════════════════════════════ */
function haversine(la1,lo1,la2,lo2) {
  const R=6371000, p1=la1*Math.PI/180, p2=la2*Math.PI/180;
  const dp=(la2-la1)*Math.PI/180, dl=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function bearing(la1,lo1,la2,lo2) {
  const p1=la1*Math.PI/180, p2=la2*Math.PI/180;
  const dl=(lo2-lo1)*Math.PI/180;
  const y=Math.sin(dl)*Math.cos(p2);
  const x=Math.cos(p1)*Math.sin(p2)-Math.sin(p1)*Math.cos(p2)*Math.cos(dl);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

/* ═══════════════════════════════════════════════════
   RENDER LOOP
═══════════════════════════════════════════════════ */
function renderLoop() {
  pulsePhase += 0.05;
  scanAngle = (scanAngle + 1.2) % 360;

  if (curLat !== undefined) {
    const dist = haversine(curLat, curLon, TLat, TLon);
    const bear = bearing(curLat, curLon, TLat, TLon);
    const relBear = (bear - heading + 360) % 360;
    drawRadar(dist, relBear);
    updateInfo(dist, bear);
  } else {
    drawEmpty();
  }

  raf = requestAnimationFrame(renderLoop);
}

/* ═══════════════════════════════════════════════════
   DRAW
═══════════════════════════════════════════════════ */
const DIRS = ['S','SV','V','JV','J','JZ','Z','SZ'];
const RING_COLORS = ['','#00ff41','#ffaa00','#ff5020']; // 1=close,2=mid,3=far

function drawEmpty() { drawRadar(null, null); }

function drawRadar(dist, relBear) {
  const W=cvs.width, H=cvs.height, cx=W/2, cy=H/2;
  const maxR = W*0.46;
  const r0 = maxR*0.115;  // center "arrived"
  const r1 = maxR*0.35;   // close ring boundary
  const r2 = maxR*0.66;   // mid ring boundary
  const r3 = maxR;        // far / outer

  // Active sector & ring
  let activeSec = -1, activeRing = -1;
  if (dist !== null && relBear !== null) {
    if (dist < 5) {
      activeRing = 0;
    } else {
      activeSec  = Math.floor(((relBear + 22.5) % 360) / 45);
      activeRing = dist < tClose ? 1 : dist < tMid ? 2 : 3;
    }
  }

  ctx.clearRect(0,0,W,H);

  // ── Background subtle glow center
  const bg = ctx.createRadialGradient(cx,cy,0,cx,cy,maxR);
  bg.addColorStop(0,'rgba(0,50,10,.18)');
  bg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(cx,cy,maxR,0,Math.PI*2); ctx.fill();

  // ── Draw 8 sectors × 3 rings
  for (let s=0; s<8; s++) {
    const aStart = (s*45 - 90 - 22.5) * Math.PI/180;
    const aEnd   = aStart + 45*Math.PI/180;

    for (let r=1; r<=3; r++) {
      const iR = r===1 ? r0 : r===2 ? r1 : r2;
      const oR = r===1 ? r1 : r===2 ? r2 : r3;
      const isActive = (s===activeSec && r===activeRing);

      ctx.save();
      ctx.beginPath();
      // inner arc start point
      ctx.moveTo(cx + iR*Math.cos(aStart), cy + iR*Math.sin(aStart));
      ctx.arc(cx,cy,oR,aStart,aEnd);
      ctx.arc(cx,cy,iR,aEnd,aStart,true);
      ctx.closePath();

      if (isActive) {
        const pulse = 0.7 + 0.3*Math.sin(pulsePhase);
        const col   = RING_COLORS[r];
        ctx.fillStyle = hexAlpha(col, 0.25*pulse);
        ctx.shadowColor= col;
        ctx.shadowBlur = 22*pulse;
        ctx.fill();
        ctx.shadowBlur = 0;
        // bright stroke
        ctx.strokeStyle = hexAlpha(col, 0.9);
        ctx.lineWidth = 1.8;
        ctx.stroke();
      } else {
        ctx.fillStyle = 'rgba(0,30,5,0.45)';
        ctx.fill();
        ctx.strokeStyle = '#0b220b';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  // ── Radial divider lines
  ctx.save();
  for (let s=0; s<8; s++) {
    const angle = (s*45 - 90)*Math.PI/180;
    ctx.beginPath();
    ctx.moveTo(cx + r0*Math.cos(angle), cy + r0*Math.sin(angle));
    ctx.lineTo(cx + r3*Math.cos(angle), cy + r3*Math.sin(angle));
    ctx.strokeStyle='#0e280e'; ctx.lineWidth=0.7; ctx.stroke();
  }
  ctx.restore();

  // ── Ring circles
  ctx.save();
  [r1,r2,r3].forEach(r => {
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='#0e280e'; ctx.lineWidth=0.8; ctx.stroke();
  });
  ctx.restore();

  // ── Scan sweep line
  const sa = (scanAngle - 90)*Math.PI/180;
  const grad = ctx.createConicalGradient
    ? null // not standard
    : null;
  // Radial fade from scan line
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx,cy,r3, sa - 0.7, sa);
  ctx.closePath();
  const sweep = ctx.createRadialGradient(cx,cy,0,cx,cy,r3);
  sweep.addColorStop(0,'rgba(0,255,65,0)');
  sweep.addColorStop(1,'rgba(0,255,65,0.07)');
  ctx.fillStyle = sweep;
  ctx.fill();

  // Scan line itself
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(cx + r3*Math.cos(sa), cy + r3*Math.sin(sa));
  ctx.strokeStyle='rgba(0,255,65,0.55)';
  ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();

  // ── Center circle
  ctx.save();
  const isCtr = (activeRing === 0);
  ctx.beginPath(); ctx.arc(cx,cy,r0,0,Math.PI*2);
  if (isCtr) {
    const p = 0.6+0.4*Math.sin(pulsePhase*1.5);
    ctx.fillStyle = `rgba(0,255,65,${p})`;
    ctx.shadowColor='#00ff41'; ctx.shadowBlur=30*p;
  } else {
    ctx.fillStyle='rgba(0,60,15,0.8)';
  }
  ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle = isCtr ? '#00ff41' : '#006614';
  ctx.lineWidth = isCtr ? 2 : 0.8;
  ctx.stroke();

  ctx.fillStyle = isCtr ? '#000' : '#006614';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const fs = r0*0.42;
  ctx.font = `900 ${fs}px 'Orbitron',sans-serif`;
  ctx.fillText('TU', cx, cy-fs*0.35);
  ctx.font = `400 ${fs*0.72}px 'Orbitron',sans-serif`;
  ctx.fillText('JSI', cx, cy+fs*0.55);
  ctx.restore();

  // ── Direction labels
  ctx.save();
  const lblR = r3 + 15;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font = `700 ${W*0.029}px 'Orbitron',sans-serif`;
  DIRS.forEach((d,i) => {
    const angle = (i*45 - 90)*Math.PI/180;
    const isActDir = (i === activeSec);
    ctx.fillStyle = isActDir ? '#00ff41' : '#1a5a1a';
    if (isActDir) { ctx.shadowColor='#00ff41'; ctx.shadowBlur=8; }
    else ctx.shadowBlur=0;
    ctx.fillText(d, cx+lblR*Math.cos(angle), cy+lblR*Math.sin(angle));
  });
  ctx.shadowBlur=0; ctx.restore();

  // ── Legend dots
  drawLegend(W, H);
}

function drawLegend(W, H) {
  const items = [
    {col:'#00ff41',lbl:'BLÍZKO'},
    {col:'#ffaa00',lbl:'STŘEDNĚ'},
    {col:'#ff5020',lbl:'DALEKO'},
  ];
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.font = `${W*0.025}px 'Share Tech Mono',monospace`;
  items.forEach((it,i) => {
    const x=8, y=H*0.93+i*(W*0.032+2)-(items.length-1)*(W*0.032+2)/2;
    ctx.fillStyle=it.col;
    ctx.beginPath(); ctx.arc(x+5, y, 4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,180,50,.6)';
    ctx.fillText(it.lbl, x+14, y);
  });
}

function hexAlpha(hex, a) {
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

/* ═══════════════════════════════════════════════════
   INFO BAR
═══════════════════════════════════════════════════ */
const DIRS8 = ['S','SV','V','JV','J','JZ','Z','SZ'];

function updateInfo(dist, bear) {
  const dv = document.getElementById('dist-val');
  const di = document.getElementById('dir-val');
  const dirLbl = DIRS8[Math.round(bear/45)%8];

  if (dist < 5) {
    dv.style.color='var(--green)';
    dv.textContent='● NA MÍSTĚ ●';
    dv.classList.add('blink');
    di.textContent='Cíl dosažen!';
  } else {
    dv.classList.remove('blink');
    dv.style.color = dist<tClose ? 'var(--green)' : dist<tMid ? 'var(--amber)' : 'var(--red)';
    dv.textContent = dist<1000 ? Math.round(dist)+' m' : (dist/1000).toFixed(2)+' km';
    di.textContent  = `Absolutní směr: ${Math.round(bear)}° ${dirLbl}  |  Komp: ${Math.round(heading)}°`;
  }
}

/* ═══════════════════════════════════════════════════
   STATUS
═══════════════════════════════════════════════════ */
function setGpsSt(s) { document.getElementById('gps-st').textContent=' '+s; }
function setCmpSt(s) { document.getElementById('cmp-st').textContent=' '+s; }

/* ═══════════════════════════════════════════════════
   BACK
═══════════════════════════════════════════════════ */
function goBack() {
  cancelAnimationFrame(raf);
  if (watchId) navigator.geolocation.clearWatch(watchId);
  window.removeEventListener('deviceorientationabsolute', onOrient, true);
  window.removeEventListener('deviceorientation', onOrient, true);
  curLat=curLon=undefined; smoothHdg=null; heading=0; gpsOk=cmpOk=false;
  document.getElementById('radar-screen').style.display='none';
  document.getElementById('setup').style.display='flex';
}

window.addEventListener('resize', () => { sizeCanvas(); });
</script>
</body>
</html>
